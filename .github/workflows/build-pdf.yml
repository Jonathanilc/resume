name: Build resume and cover letter PDFs

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache LaTeX Docker image
        id: latex-docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/texlive-docker-cache
          key: latex-docker-${{ runner.os }}-texlive-full-latest

      - name: Load or pull LaTeX Docker image
        run: |
          if [ -f /tmp/texlive-docker-cache/texlive-full-latest.tar ]; then
            echo "Loading Docker image from cache..."
            docker load -i /tmp/texlive-docker-cache/texlive-full-latest.tar
          else
            echo "Pulling Docker image (will be cached for next run)..."
            docker pull ghcr.io/xu-cheng/texlive-full:latest
            mkdir -p /tmp/texlive-docker-cache
            docker save ghcr.io/xu-cheng/texlive-full:latest -o /tmp/texlive-docker-cache/texlive-full-latest.tar
          fi

      - name: Compile baseline resume and cover letter
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            resume.tex
            coverletter.tex
          latexmk_use_xelatex: true

      - name: Compile variants
        run: |
          shopt -s nullglob
          variants=(variants/*/*.tex)
          if [ ${#variants[@]} -eq 0 ]; then
            echo "No variants found, skipping."
            exit 0
          fi
          for v in "${variants[@]}"; do
            variant_dir=$(dirname "$v")
            echo "::group::Compiling $v"
            docker run --rm \
              -v "$PWD:/workdir" \
              -w /workdir \
              ghcr.io/xu-cheng/texlive-full:latest \
              latexmk -xelatex -output-directory="$variant_dir" -interaction=nonstopmode "$v"
            echo "::endgroup::"
          done

      - name: Collect PDFs
        run: |
          mkdir -p output
          [ -f resume.pdf ] && cp resume.pdf output/resume.pdf
          [ -f coverletter.pdf ] && cp coverletter.pdf output/coverletter.pdf
          shopt -s nullglob
          for d in variants/*/; do
            variant=$(basename "$d")
            for pdf in "$d"*.pdf; do
              [ -f "$pdf" ] || continue
              doctype=$(basename "$pdf" .pdf)
              cp "$pdf" "output/${variant}-${doctype}.pdf"
            done
          done
          echo "Built PDFs:"
          ls -la output/

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdfs
          path: output/*.pdf
