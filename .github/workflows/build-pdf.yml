name: Build resume and cover letter PDFs

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # Discover the baseline + every variant folder at runtime and emit them as a
  # build matrix, so adding a new variants/<name>/ folder automatically gets its
  # own standalone build job + artifact with no workflow edits.
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build matrix of baseline + variants
        id: set
        run: |
          # The baseline lives at the repo root; each variant in variants/<name>/.
          # Each matrix entry: name (artifact name), files (.tex paths), outdir.
          matrix=$(jq -nc '[{name:"baseline", files:"resume.tex coverletter.tex", outdir:"."}]')
          shopt -s nullglob
          for d in variants/*/; do
            name=$(basename "$d")
            files=$(printf '%s ' "$d"*.tex | xargs)
            [ -z "$files" ] && continue
            matrix=$(echo "$matrix" | jq -c --arg n "$name" --arg f "$files" --arg o "$d" \
              '. + [{name:$n, files:$f, outdir:$o}]')
          done
          echo "matrix={\"include\":$matrix}" >> "$GITHUB_OUTPUT"
          echo "Discovered build targets:"
          echo "$matrix" | jq -r '.[].name'

  # Pull the (large) TeX Live image exactly once per run and hand it to every
  # build job as an artifact, instead of each matrix job pulling it itself.
  # A cache keeps the pull from happening at all on repeat runs.
  prepare-image:
    runs-on: ubuntu-latest
    steps:
      - name: Cache LaTeX Docker image
        id: latex-docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/texlive-docker-cache
          key: latex-docker-${{ runner.os }}-texlive-full-latest

      - name: Pull and save image if not cached
        run: |
          if [ ! -f /tmp/texlive-docker-cache/texlive-full-latest.tar ]; then
            echo "Pulling Docker image (will be cached for next run)..."
            docker pull ghcr.io/xu-cheng/texlive-full:latest
            mkdir -p /tmp/texlive-docker-cache
            docker save ghcr.io/xu-cheng/texlive-full:latest -o /tmp/texlive-docker-cache/texlive-full-latest.tar
          else
            echo "Image tar already present from cache."
          fi

      - name: Upload image artifact for build jobs
        uses: actions/upload-artifact@v4
        with:
          name: texlive-image
          path: /tmp/texlive-docker-cache/texlive-full-latest.tar
          retention-days: 1

  # One standalone job per baseline/variant. fail-fast: false so a broken
  # variant fails only its own job, not the others.
  build:
    needs: [discover, prepare-image]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download LaTeX Docker image
        uses: actions/download-artifact@v4
        with:
          name: texlive-image
          path: /tmp/texlive-image

      - name: Load LaTeX Docker image
        run: docker load -i /tmp/texlive-image/texlive-full-latest.tar

      - name: Compile ${{ matrix.name }}
        run: |
          mkdir -p output
          for f in ${{ matrix.files }}; do
            echo "::group::Compiling $f"
            docker run --rm \
              -v "$PWD:/workdir" \
              -w /workdir \
              ghcr.io/xu-cheng/texlive-full:latest \
              latexmk -xelatex -output-directory="${{ matrix.outdir }}" -interaction=nonstopmode "$f"
            echo "::endgroup::"
          done
          for f in ${{ matrix.files }}; do
            base=$(basename "$f" .tex)
            pdf="${{ matrix.outdir }}/$base.pdf"
            [ -f "$pdf" ] && cp "$pdf" "output/$base.pdf"
          done
          echo "Built PDFs for ${{ matrix.name }}:"
          ls -la output/

      - name: Upload ${{ matrix.name }} PDFs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: output/*.pdf
          if-no-files-found: error
